<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>求人者登録 | MediSpot</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header simple-header">
    <a class="brand" href="index.html">
      <span class="brand-mark">医</span>
      <span class="brand-copy"><strong>MediSpot</strong><small>メディスポット</small></span>
    </a>
  </header>

  <main class="auth-page">
    <section class="auth-card auth-card-wide">
      <p class="eyebrow">Employer</p>
      <h1>求人者登録</h1>
      <p>施設情報と募集したい人材条件を入力して、医療人材の募集を始めましょう。</p>

      <form id="registerForm" data-role="employer">
        <input type="hidden" id="role" value="employer">

        <div class="form-grid">
          <div class="form-group">
            <label for="name">担当者名</label>
            <input type="text" id="name" autocomplete="name" required>
          </div>

          <div class="form-group">
            <label for="email">メールアドレス</label>
            <input type="email" id="email" autocomplete="email" required>
          </div>

          <div class="form-group">
            <label for="password">パスワード</label>
            <input type="password" id="password" autocomplete="new-password" minlength="8" required>
          </div>

          <div class="form-group">
            <label for="organizationName">医療機関名・法人名</label>
            <input type="text" id="organizationName" required>
          </div>

          <div class="form-group">
            <label for="facility">施設区分</label>
            <select id="facility" required>
              <option value="">選択してください</option>
              <option>病院</option>
              <option>クリニック</option>
              <option>調剤薬局</option>
              <option>介護施設</option>
              <option>健診センター</option>
            </select>
          </div>

          <div class="form-group">
            <label for="phone">電話番号</label>
            <input type="tel" id="phone" autocomplete="tel" placeholder="例：03-1234-5678">
          </div>

          <div class="form-group form-wide">
            <label for="address">所在地</label>
            <input type="text" id="address" autocomplete="street-address" placeholder="例：東京都千代田区...">
          </div>

          <div class="form-group form-wide">
            <label for="hiringNeeds">募集したい職種・条件</label>
            <textarea id="hiringNeeds" rows="4" placeholder="例：看護師、週2日、午前のみ、スポット勤務など"></textarea>
          </div>
        </div>

        <button type="submit" class="button button-primary auth-submit">登録する</button>

        <p class="auth-link">
          求職者の方は <a href="seeker-register.html">求職者登録</a> / 登録済みの方は <a href="login.html">ログイン</a>
        </p>
      </form>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="register.js"></script>
</body>
</html>
