<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ログイン | MediSpot</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="site-header">
  <a class="brand" href="index.html">
    <span class="brand-mark">✚</span>MediSpot
  </a>
</header>

<main class="auth-page">
  <section class="auth-card">
    <h1>ログイン</h1>
    <p>メールアドレスとパスワードを入力してください。</p>

    <form id="loginForm">
      <div class="form-group">
        <label>メールアドレス</label>
        <input type="email" id="email" required>
      </div>

      <div class="form-group">
        <label>パスワード</label>
        <input type="password" id="password" required>
      </div>

      <button type="submit" class="button button-teal auth-submit">
        ログイン
      </button>

      <div class="demo-login">
        <button type="button" id="seekerDemo">
          求職者デモログイン
        </button>

        <button type="button" id="employerDemo">
          求人者デモログイン
        </button>
      </div>

      <p class="auth-link">
        アカウントをお持ちでない方は
        <a href="register.html">会員登録</a>
      </p>
    </form>
  </section>
</main>

<script>
  document.getElementById("loginForm").addEventListener("submit", (e) => {
    e.preventDefault();

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    
    
  });

  document.getElementById("seekerDemo").addEventListener("click", () => {
    document.getElementById("email").value = "seeker-demo@medispot.jp";
    document.getElementById("password").value = "password123";
  });

  document.getElementById("employerDemo").addEventListener("click", () => {
    document.getElementById("email").value = "employer-demo@medispot.jp";
    document.getElementById("password").value = "password123";
  });
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="login.js"></script>
</body>
</html>
