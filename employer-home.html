<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>求人者ホーム | MediSpot</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header dashboard-header">
    <a class="brand" href="index.html"><span class="brand-mark">＋</span>MediSpot</a>
    <nav class="main-nav dashboard-nav" aria-label="求人者メニュー">
      <a href="employer-home.html">ホーム</a>
      <a href="index.html#price">料金</a>
      <a href="index.html#flow">ご利用の流れ</a>
      <a href="index.html#features">サービス</a>
    </nav>
    <div class="header-actions">
      <a class="button button-outline" href="index.html">トップへ戻る</a>
    </div>
  </header>

  <main class="dashboard-page employer-dashboard">
    <section class="dashboard-hero shell">
      <div>
        <p class="dashboard-kicker">求人者ダッシュボード</p>
        <h1>必要な医療人材とスムーズにつながる</h1>
        <p>求人掲載は無料。採用が決まったときだけ成功報酬が発生します。</p>
        <div class="button-row">
          <a class="button button-orange" href="index.html#price">料金を見る</a>
          <a class="button button-outline" href="index.html#flow">掲載の流れを見る</a>
        </div>
      </div>
      <img src="images/20_employer.png" alt="求人者">
    </section>

    <section class="dashboard-grid shell" aria-label="求人者メニュー">
      <article class="dashboard-card">
        <span>1</span>
        <h2>求人情報を作成</h2>
        <p>職種、勤務地、勤務時間、報酬など、募集条件を登録します。</p>
      </article>
      <article class="dashboard-card">
        <span>2</span>
        <h2>応募者を確認</h2>
        <p>資格や経験を確認し、条件に合う人材へ連絡できます。</p>
      </article>
      <article class="dashboard-card">
        <span>3</span>
        <h2>面談・契約</h2>
        <p>チャットや契約テンプレートを使って、採用まで進められます。</p>
      </article>
    </section>
  </main>
</body>
</html>
