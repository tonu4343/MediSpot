<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>求職者ホーム | MediSpot</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header dashboard-header">
    <a class="brand" href="index.html"><span class="brand-mark">＋</span>MediSpot</a>
    <nav class="main-nav dashboard-nav" aria-label="求職者メニュー">
      <a href="seeker-home.html">ホーム</a>
      <a href="index.html#jobs">求人を探す</a>
      <a href="index.html#features">サービス</a>
      <a href="index.html#price">料金</a>
    </nav>
    <div class="header-actions">
      <a class="button button-outline" href="index.html">トップへ戻る</a>
    </div>
  </header>

  <main class="dashboard-page">
    <section class="dashboard-hero shell">
      <div>
        <p class="dashboard-kicker">求職者ダッシュボード</p>
        <h1>あなたに合う医療求人を探しましょう</h1>
        <p>スポット勤務・業務委託など、ライフスタイルに合わせた働き方を見つけられます。</p>
        <div class="button-row">
          <a class="button button-teal" href="index.html#jobs">求人を見る</a>
          <a class="button button-outline" href="index.html#professions">対応職種を見る</a>
        </div>
      </div>
      <img src="images/19_job_seeker.png" alt="求職者">
    </section>

    <section class="dashboard-grid shell" aria-label="求職者メニュー">
      <article class="dashboard-card">
        <span>1</span>
        <h2>プロフィール登録</h2>
        <p>資格、経験、希望エリアを整理して、マッチしやすい状態にしましょう。</p>
      </article>
      <article class="dashboard-card">
        <span>2</span>
        <h2>求人検索</h2>
        <p>病院、クリニック、薬局、介護施設などの求人を確認できます。</p>
      </article>
      <article class="dashboard-card">
        <span>3</span>
        <h2>チャット相談</h2>
        <p>気になる求人は、条件や勤務内容を事前に相談できます。</p>
      </article>
    </section>
  </main>
</body>
</html>
